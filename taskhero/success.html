<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success! - TaskHero</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            color: white;
            text-align: center;
            padding: 2rem;
        }
        
        .success-container {
            max-width: 600px;
        }
        
        .checkmark {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            animation: scaleIn 0.5s ease;
        }
        
        .checkmark i {
            font-size: 4rem;
            color: #10B981;
        }
        
        @keyframes scaleIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }
        
        .buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-white {
            background: white;
            color: #10B981;
        }
        
        .btn-white:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .btn-outline {
            background: transparent;
            color: white;
            border: 2px solid white;
        }
        
        .btn-outline:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .confetti {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }
        
        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            animation: confettiFall 3s linear forwards;
        }
        
        @keyframes confettiFall {
            0% {
                transform: translateY(-100%) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="confetti" id="confetti"></div>
    
    <div class="success-container">
        <div class="checkmark">
            <i class="fas fa-check"></i>
        </div>
        
        <h1>You're All Set! 🎉</h1>
        <p>Your account has been created successfully. Welcome to the TaskHero community!</p>
        
        <div class="buttons">
            <a href="/taskhero/register.html" class="btn btn-white">
                <i class="fas fa-search"></i> Find a Pro
            </a>
            <a href="/taskhero/" class="btn btn-outline">
                <i class="fas fa-home"></i> Go Home
            </a>
        </div>
    </div>
    
    <script>
        // Create confetti
        function createConfetti() {
            const container = document.getElementById('confetti');
            const colors = ['#6366F1', '#10B981', '#F59E0B', '#EF4444', '#EC4899'];
            
            for (let i = 0; i < 100; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDelay = Math.random() * 2 + 's';
                piece.style.transform = `rotate(${Math.random() * 360}deg)`;
                container.appendChild(piece);
            }
        }
        
        createConfetti();
        
        // Voice announcement
        speak('Congratulations! Your account has been created successfully. Welcome to TaskHero!');
    </script>
<script>/**
 * MAHA LAKSHMI - Biometric Authentication Guard
 */
(function() {
    'use strict';
    const SESSION_KEY = 'maha_lakshmi_session';
    
    function checkAuth() {
        if (window.location.pathname.includes('biometric-auth.html')) return true;
        const session = localStorage.getItem(SESSION_KEY);
        if (!session) { window.location.href = 'biometric-auth.html'; return false; }
        try {
            const d = JSON.parse(session);
            if (Date.now() - d.timestamp < 86400000) return true;
            localStorage.removeItem(SESSION_KEY);
        } catch(e) {}
        window.location.href = 'biometric-auth.html';
        return false;
    }
    window.biometricLogout = function() { localStorage.removeItem(SESSION_KEY); window.location.href = 'biometric-auth.html'; };
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', checkAuth);
    else setTimeout(checkAuth, 100);
})();
</script></body>
</html>
