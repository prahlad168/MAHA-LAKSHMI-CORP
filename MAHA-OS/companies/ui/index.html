<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Companies - MAHA AIOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #1a5f5a; --primary-dark: #0d3d3a; --secondary: #c9a86c; --success: #22c55e; --warning: #f59e0b; --danger: #ef4444; --gray: #64748b; }
        body { font-family: 'Nunito', sans-serif; background: #f5f7fa; min-height: 100vh; }
        .header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 25px 30px; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; }
        .header p { opacity: 0.9; font-size: 0.9rem; }
        .container { max-width: 1400px; margin: 0 auto; padding: 25px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .stat-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 15px; }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--primary); }
        .stat-label { color: var(--gray); font-size: 0.9rem; }
        .section-title { font-size: 1.2rem; font-weight: 700; color: #1e293b; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .company-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .company-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.3s; }
        .company-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .company-header { padding: 20px; display: flex; align-items: center; gap: 15px; }
        .company-icon { width: 60px; height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: white; }
        .company-info h3 { font-size: 1rem; font-weight: 700; color: #1e293b; margin-bottom: 3px; }
        .company-info p { font-size: 0.85rem; color: var(--gray); }
        .company-body { padding: 0 20px 20px; }
        .company-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .company-stat { background: #f8fafc; border-radius: 8px; padding: 12px; text-align: center; }
        .company-stat-value { font-size: 1.2rem; font-weight: 700; color: var(--primary); }
        .company-stat-label { font-size: 0.75rem; color: var(--gray); }
        .progress-bar { background: #e2e8f0; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
        .progress-text { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--gray); margin-bottom: 15px; }
        .company-footer { padding: 15px 20px; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: all 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-secondary { background: #f1f5f9; color: var(--gray); }
        .btn-secondary:hover { background: #e2e8f0; }
        .loading { text-align: center; padding: 50px; color: var(--gray); }
        @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏢 MAHA Company Portfolio</h1>
        <p>Manage 10 Strategic Business Units (SBU)</p>
    </div>
    
    <div class="container">
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #22c55e, #16a34a); color: white;">
                    <i class="fas fa-building"></i>
                </div>
                <div class="stat-value" id="totalCompanies">10</div>
                <div class="stat-label">Total Companies</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #3b82f6, #2563eb); color: white;">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="stat-value" id="activeCompanies">10</div>
                <div class="stat-label">Active</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #f59e0b, #d97706); color: white;">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="stat-value" id="avgProgress">14.3%</div>
                <div class="stat-label">Avg Progress</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: white;">
                    <i class="fas fa-coins"></i>
                </div>
                <div class="stat-value">Rp 1B</div>
                <div class="stat-label">Total Target/Bulan</div>
            </div>
        </div>
        
        <h2 class="section-title"><i class="fas fa-trophy" style="color: #f59e0b;"></i> Top Performers</h2>
        <div class="company-grid" id="topCompanies"></div>
        
        <h2 class="section-title" style="margin-top: 30px;"><i class="fas fa-building" style="color: var(--primary);"></i> All Companies (10 SBU)</h2>
        <div class="company-grid" id="allCompanies">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
        </div>
    </div>
    
    <script>
        const API_URL = '/MAHA-OS/companies/api/companies.php';
        
        async function loadCompanies() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                if (data.success) {
                    renderCompanies(data.data);
                    updateStats(data.data);
                }
            } catch (err) {
                console.error('Error:', err);
            }
        }
        
        function renderCompanies(companies) {
            const sorted = [...companies].sort((a, b) => b.progress - a.progress);
            document.getElementById('topCompanies').innerHTML = sorted.slice(0, 2).map(c => createCard(c)).join('');
            document.getElementById('allCompanies').innerHTML = sorted.map(c => createCard(c)).join('');
        }
        
        function createCard(c) {
            const color = c.progress >= 50 ? '#22c55e' : c.progress >= 25 ? '#f59e0b' : '#ef4444';
            return '<div class="company-card">' +
                '<div class="company-header">' +
                    '<div class="company-icon" style="background:' + c.color + ';">' + c.icon + '</div>' +
                    '<div class="company-info"><h3>' + c.short_name + '</h3><p>' + c.niche + '</p></div>' +
                '</div>' +
                '<div class="company-body">' +
                    '<div class="company-stats">' +
                        '<div class="company-stat"><div class="company-stat-value">Rp 100M</div><div class="company-stat-label">Target</div></div>' +
                        '<div class="company-stat"><div class="company-stat-value">Rp 0</div><div class="company-stat-label">Revenue</div></div>' +
                    '</div>' +
                    '<div class="progress-text"><span>Progress</span><span style="font-weight:700;color:' + color + ';">' + c.progress + '%</span></div>' +
                    '<div class="progress-bar"><div class="progress-fill" style="width:' + c.progress + '%;background:' + color + ';"></div></div>' +
                '</div>' +
                '<div class="company-footer">' +
                    '<button class="btn btn-primary"><i class="fas fa-eye"></i> View</button>' +
                    '<button class="btn btn-secondary"><i class="fas fa-edit"></i> Edit</button>' +
                '</div></div>';
        }
        
        function updateStats(companies) {
            const avg = companies.reduce((sum, c) => sum + c.progress, 0) / companies.length;
            document.getElementById('avgProgress').textContent = avg.toFixed(1) + '%';
        }
        
        loadCompanies();
    </script>
</body>
</html>
