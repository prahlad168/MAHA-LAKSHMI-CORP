<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Auto Reply - Repeat Order System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #111b21; color: #e9edef; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; margin-bottom: 30px; color: #25D366; }
        .chat-box { background: #1f2c33; border-radius: 16px; padding: 20px; height: 400px; overflow-y: auto; margin-bottom: 20px; }
        .message { margin-bottom: 15px; padding: 12px 16px; border-radius: 12px; max-width: 85%; }
        .message.incoming { background: #202c33; align-self: flex-start; }
        .message.outgoing { background: #005c4b; align-self: flex-end; margin-left: auto; }
        .message .time { font-size: 0.7rem; opacity: 0.6; margin-top: 5px; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 15px; border-radius: 24px; border: none; background: #2a3942; color: white; font-size: 1rem; }
        button { padding: 15px 25px; border-radius: 24px; border: none; background: #00a884; color: white; cursor: pointer; font-weight: 600; }
        button:hover { background: #008069; }
        .quick-replies { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .quick-btn { background: #2a3942; padding: 10px 15px; border-radius: 20px; border: none; color: white; cursor: pointer; font-size: 0.9rem; }
        .quick-btn:hover { background: #374249; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #1f2c33; padding: 15px; border-radius: 12px; text-align: center; }
        .stat-box h3 { color: #25D366; font-size: 1.5rem; }
        .stat-box p { font-size: 0.8rem; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💬 WhatsApp Auto Reply System</h1>
        
        <div class="stats">
            <div class="stat-box"><h3 id="msgCount">0</h3><p>Pesan Hari Ini</p></div>
            <div class="stat-box"><h3 id="repeatRate">0%</h3><p>Repeat Order</p></div>
            <div class="stat-box"><h3 id="responseRate">100%</h3><p>Response Rate</p></div>
        </div>
        
        <h3 style="margin-bottom: 10px;">⚡ Quick Replies</h3>
        <div class="quick-replies">
            <button class="quick-btn" onclick="sendQuickReply('Ya, saya tertarik! Kapan bisa mulai?')">Ya, tertarik!</button>
            <button class="quick-btn" onclick="sendQuickReply('Berapa harganya?')">Harga?</button>
            <button class="quick-btn" onclick="sendQuickReply('Bisa discount nggak?')">Discount?</button>
            <button class="quick-btn" onclick="sendQuickReply('Saya mau repeat order. Ada promo?')">Repeat Order</button>
            <button class="quick-btn" onclick="sendQuickReply('Terima kasih! Saya akan kabari jika sudah siap.')">Terima Kasih</button>
        </div>
        
        <div class="chat-box" id="chatBox">
            <div class="message incoming">
                <div>👋 Halo! Terima kasih sudah menghubungi kami. Ada yang bisa kami bantu hari ini?</div>
                <div class="time">10:00</div>
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()">Kirim</button>
        </div>
    </div>
    
    <script>
        let msgCount = 0;
        const responses = {
            'tidak': 'Tidak apa-apa! Jika nanti butuh, silakan hubungi kami lagi ya. Kami siap membantu kapan saja 😊',
            'mahal': 'Kami menawarkan kualitas premium dengan harga yang sesuai. Tapi untuk Anda, kami berikan <b>DISKON 20%</b> khusus! Apakah Anda mau lanjut?',
            'repeat': '🎉 TERIMA KASIH sudah repeat order! Sebagai apresiasi, kami berikan <b>BONUS EXTRA 15%</b> untuk pemesanan kali ini. Mau lanjut?',
            'promo': '🔥 PROMO SPESIAL:\n\n• Repeat Order = Bonus 15%\n• Order 3x = Diskon 20%\n• Membership = Diskon 30%\n\nMau jadi member? Kostenlos!',
            'belum': 'Tidak masalah! Kami akan <b>follow up</b> seminggu lagi ya. Terima kasih sudah waktunya! 🙏',
            'ya': '🎉 Sempurna! Untuk repeat order, Anda mendapat:\n\n✅ Diskon 15%\n✅ Free konsultasi\n✅ Priority service\n\nSilakan tentukan waktu untuk diskusi lebih lanjut!',
            'sip': '👍 Siap! Kami catat Anda. Stay tuned untuk update dan promo eksklusif dari kami!',
            'default': 'Terima kasih pesanannya! Kami akan proses dan hubungi Anda kembali untuk detail. Ada pertanyaan lain? 😊'
        };
        
        function getResponse(msg) {
            msg = msg.toLowerCase();
            if (msg.includes('tidak') || msg.includes('gak') || msg.includes('no')) return responses['tidak'];
            if (msg.includes('mahal') || msg.includes('beli') && msg.includes(' dulu')) return responses['mahal'];
            if (msg.includes('repeat') || msg.includes('order lagi')) return responses['repeat'];
            if (msg.includes('promo') || msg.includes('diskon') || msg.includes('sale')) return responses['promo'];
            if (msg.includes('belum') || msg.includes('nanti') || msg.includes('msh')) return responses['belum'];
            if (msg.includes('ya') || msg.includes('ok') || msg.includes('iya') || msg.includes('sipp')) return responses['ya'];
            if (msg.includes('sip') || msg.includes('oke')) return responses['sip'];
            return responses['default'];
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const msg = input.value.trim();
            if (!msg) return;
            
            addMessage(msg, 'outgoing');
            input.value = '';
            msgCount++;
            document.getElementById('msgCount').textContent = msgCount;
            
            // Auto reply after delay
            setTimeout(() => {
                const reply = getResponse(msg);
                addMessage(reply, 'incoming');
                msgCount++;
                document.getElementById('msgCount').textContent = msgCount;
            }, 1500);
        }
        
        function sendQuickReply(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
        }
        
        function addMessage(text, type) {
            const chatBox = document.getElementById('chatBox');
            const time = new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = `<div>${text}</div><div class="time">${time}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
