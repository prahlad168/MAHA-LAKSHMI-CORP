<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 MAHA LAKSHMI - CEO Report Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a5f5a;
            --primary-light: #2d8a84;
            --secondary: #c9a86c;
            --success: #22c55e;
            --warning: #f59e0b;
            --light: #f8fafc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; background: var(--light); color: #333; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 { font-size: 2rem; }
        .header p { opacity: 0.9; }
        .header .meta { margin-top: 10px; font-size: 0.9rem; opacity: 0.9; }
        .header .live-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        .summary-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 3px 15px rgba(0,0,0,0.05);
        }
        .summary-card .icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            color: white;
            font-size: 1.2rem;
        }
        .summary-card .number { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
        .summary-card .label { color: #666; font-size: 0.7rem; margin-top: 5px; }
        .summary-card.revenue .icon { background: linear-gradient(135deg, var(--success), #16a34a); }
        .summary-card.revenue .number { color: var(--success); }
        
        .profit-section {
            background: linear-gradient(135deg, var(--secondary) 0%, #d4a96a 100%);
            padding: 20px;
            border-radius: 15px;
            color: white;
            margin-bottom: 25px;
        }
        .profit-section h2 { font-family: 'Playfair Display', serif; margin-bottom: 15px; }
        .profit-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }
        .profit-item {
            background: rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }
        .profit-item .label { font-size: 0.75rem; opacity: 0.9; }
        .profit-item .amount { font-size: 1.2rem; font-weight: 700; }
        .profit-item .note { font-size: 0.65rem; opacity: 0.8; margin-top: 3px; }
        
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--primary);
            margin-bottom: 15px;
        }
        
        .company-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 15px;
        }
        .company-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 15px rgba(0,0,0,0.05);
        }
        .company-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .company-header h3 { font-size: 0.9rem; }
        .company-header small { opacity: 0.8; font-size: 0.7rem; }
        .company-header .badge {
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.65rem;
        }
        
        .company-body { padding: 12px; }
        .company-meta {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
            font-size: 0.7rem;
            color: #666;
        }
        .company-meta i { color: var(--primary); margin-right: 3px; }
        
        .progress-bar {
            background: #e0e0e0;
            height: 5px;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 6px;
        }
        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
        }
        
        .task-section { margin-bottom: 8px; }
        .task-section h4 {
            font-size: 0.7rem;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .task-section ul { list-style: none; font-size: 0.7rem; }
        .task-section li { padding: 2px 0; padding-left: 12px; position: relative; color: #555; }
        .task-section li::before { content: '•'; position: absolute; left: 2px; color: var(--primary); }
        .done li::before { color: var(--success); content: '✓'; }
        .next li::before { color: var(--warning); content: '→'; }
        .doing li::before { color: var(--primary); content: '◉'; }
        
        .metrics-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            font-size: 0.7rem;
        }
        .metric {
            background: var(--light);
            padding: 5px 8px;
            border-radius: 5px;
            flex: 1;
            text-align: center;
        }
        .metric .val { font-weight: 700; color: var(--primary); }
        .metric .key { color: #666; font-size: 0.6rem; }
        
        .revenue-mini {
            background: var(--light);
            padding: 8px;
            border-radius: 6px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .revenue-mini .label { font-size: 0.75rem; color: #666; }
        .revenue-mini .amount { font-size: 1rem; font-weight: 700; color: var(--success); }
        
        .auto-transfer {
            background: linear-gradient(135deg, #065f46 0%, #059669 100%);
            padding: 20px;
            border-radius: 15px;
            color: white;
            margin-top: 25px;
        }
        .auto-transfer h2 { font-family: 'Playfair Display', serif; margin-bottom: 15px; }
        .transfer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        .transfer-item {
            background: rgba(255,255,255,0.15);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }
        .transfer-item .label { font-size: 0.75rem; opacity: 0.9; }
        .transfer-item .value { font-size: 1.1rem; font-weight: 700; margin: 5px 0; }
        .transfer-item .detail { font-size: 0.7rem; opacity: 0.8; }
        
        .footer {
            text-align: center;
            padding: 25px;
            color: #666;
            font-size: 0.8rem;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #666;
        }
        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 1200px) {
            .summary-grid { grid-template-columns: repeat(3, 1fr); }
            .profit-grid { grid-template-columns: repeat(3, 1fr); }
            .transfer-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .summary-grid, .profit-grid, .transfer-grid, .company-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>👑 MAHA LAKSHMI</h1>
        <p>CEO Real-Time Report - 10 Digital Companies</p>
        <p class="meta">
            <span class="live-dot"></span>LIVE
            | <span id="currentDate"></span>
            | <span id="currentTime"></span> WIB
        </p>
    </div>
    
    <div class="container" id="mainContent">
        <div class="loading">
            <i class="fas fa-spinner"></i>
            <p>Memuat data real-time...</p>
        </div>
    </div>
    
    <script>
        const API_URL = 'api.php';
        
        function formatRupiah(num) {
            if (num >= 1000000) return 'Rp ' + (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return 'Rp ' + (num / 1000).toFixed(0) + 'K';
            return 'Rp ' + num.toLocaleString('id-ID');
        }
        
        async function loadData() {
            try {
                const response = await fetch(API_URL + '?t=' + Date.now());
                const data = await response.json();
                
                if (data.success) {
                    renderReport(data);
                    startClock();
                    setInterval(loadData, 30000);
                }
            } catch (error) {
                document.getElementById('mainContent').innerHTML = `
                    <div style="text-align:center;padding:40px;color:#666;">
                        <i class="fas fa-exclamation-triangle" style="font-size:2rem;color:#f59e0b;"></i>
                        <p style="margin-top:10px;">Gagal memuat data dari API</p>
                    </div>
                `;
            }
        }
        
        function renderReport(data) {
            const companiesHTML = data.companies.map(c => `
                <div class="company-card">
                    <div class="company-header">
                        <div>
                            <h3>${c.id}. ${c.name}</h3>
                            <small>${c.niche}</small>
                        </div>
                        <span class="badge">${c.status.toUpperCase()}</span>
                    </div>
                    <div class="company-body">
                        <div class="company-meta">
                            <span><i class="fas fa-robot"></i> 6 Agents</span>
                            <span><i class="fas fa-bullseye"></i> ${c.progress}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="fill" style="width: ${c.progress}%"></div>
                        </div>
                        
                        <div class="task-section done">
                            <h4>✅ Kemarin (Done)</h4>
                            <ul>
                                ${c.done_today.map(t => `<li>${t}</li>`).join('')}
                            </ul>
                        </div>
                        
                        <div class="task-section">
                            <h4>🔄 Hari Ini (Working)</h4>
                            <ul class="doing">
                                ${c.doing_now.map(t => `<li>${t}</li>`).join('')}
                            </ul>
                        </div>
                        
                        <div class="task-section next">
                            <h4>📋 Besok (Pending)</h4>
                            <ul>
                                ${c.next_tasks.map(t => `<li>${t}</li>`).join('')}
                            </ul>
                        </div>
                        
                        <div class="metrics-row">
                            <div class="metric">
                                <div class="val">${c.leads}</div>
                                <div class="key">Leads</div>
                            </div>
                            <div class="metric">
                                <div class="val">${c.customers}</div>
                                <div class="key">Customers</div>
                            </div>
                            <div class="metric">
                                <div class="val">${c.visits_today}</div>
                                <div class="key">Visits</div>
                            </div>
                        </div>
                        
                        <div class="revenue-mini">
                            <span class="label">Revenue: ${formatRupiah(c.revenue)}</span>
                            <span class="amount">${c.progress}%</span>
                        </div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('mainContent').innerHTML = `
                <div class="summary-grid">
                    <div class="summary-card">
                        <div class="icon"><i class="fas fa-building"></i></div>
                        <div class="number">${data.companies.length}</div>
                        <div class="label">Companies</div>
                    </div>
                    <div class="summary-card">
                        <div class="icon"><i class="fas fa-check-circle"></i></div>
                        <div class="number">${data.companies.filter(c => c.status === 'active').length}</div>
                        <div class="label">Active</div>
                    </div>
                    <div class="summary-card">
                        <div class="icon"><i class="fas fa-users"></i></div>
                        <div class="number">${data.totals.visits_today}</div>
                        <div class="label">Visits Hari Ini</div>
                    </div>
                    <div class="summary-card">
                        <div class="icon"><i class="fas fa-handshake"></i></div>
                        <div class="number">${data.totals.leads}</div>
                        <div class="label">Total Leads</div>
                    </div>
                    <div class="summary-card revenue">
                        <div class="icon"><i class="fas fa-coins"></i></div>
                        <div class="number">${formatRupiah(data.totals.revenue)}</div>
                        <div class="label">Revenue</div>
                    </div>
                    <div class="summary-card">
                        <div class="icon"><i class="fas fa-user-check"></i></div>
                        <div class="number">${data.totals.customers}</div>
                        <div class="label">Customers</div>
                    </div>
                </div>
                
                <div class="profit-section">
                    <h2>💰 Laporan Pendapatan & Profit Distribution</h2>
                    <p style="margin-bottom: 12px; opacity: 0.9;">${data.timestamp}</p>
                    <div class="profit-grid">
                        <div class="profit-item">
                            <div class="label">Total Revenue</div>
                            <div class="amount">${formatRupiah(data.totals.revenue)}</div>
                        </div>
                        <div class="profit-item">
                            <div class="label">CEO Share (60%)</div>
                            <div class="amount">${formatRupiah(data.profit_distribution.ceo_share)}</div>
                            <div class="note">→ ${data.profit_distribution.bank_account}</div>
                        </div>
                        <div class="profit-item">
                            <div class="label">Reinvestment (25%)</div>
                            <div class="amount">${formatRupiah(data.profit_distribution.reinvestment)}</div>
                            <div class="note">→ Company ops</div>
                        </div>
                        <div class="profit-item">
                            <div class="label">Agent (10%)</div>
                            <div class="amount">${formatRupiah(data.profit_distribution.agent_rewards)}</div>
                            <div class="note">→ AI agents</div>
                        </div>
                        <div class="profit-item">
                            <div class="label">Reserve (5%)</div>
                            <div class="amount">${formatRupiah(data.profit_distribution.reserve)}</div>
                            <div class="note">→ Emergency</div>
                        </div>
                    </div>
                </div>
                
                <h2 class="section-title"><i class="fas fa-chart-bar"></i> Detail Progress 10 Perusahaan</h2>
                <div class="company-grid">
                    ${companiesHTML}
                </div>
                
                <div class="auto-transfer">
                    <h2>🏦 Sistem Auto Transfer - Agent GAURANGA</h2>
                    <div class="transfer-grid">
                        <div class="transfer-item">
                            <div class="label">Schedule Update</div>
                            <div class="value">SETIAP HARI</div>
                            <div class="detail">Jam ${data.schedule.daily_update}</div>
                        </div>
                        <div class="transfer-item">
                            <div class="label">Rekening Tujuan</div>
                            <div class="value">${data.profit_distribution.bank_account}</div>
                            <div class="detail">a/n ${data.profit_distribution.account_name}</div>
                        </div>
                        <div class="transfer-item">
                            <div class="label">Profit Share</div>
                            <div class="value">60% - 25%</div>
                            <div class="detail">CEO - Reinvest</div>
                        </div>
                        <div class="transfer-item">
                            <div class="label">Share Detail</div>
                            <div class="value">10% - 5%</div>
                            <div class="detail">Agent - Reserve</div>
                        </div>
                    </div>
                </div>
                
                <div class="footer">
                    <p>👑 MAHA LAKSHMI - CEO Dashboard | Generated by Agent GAURANGA</p>
                    <p>🕐 Last Updated: <span id="lastUpdate"></span></p>
                    <p style="margin-top: 10px;">Motto: "Setiap kesalahan harus ada solusinya!"</p>
                </div>
            `;
            
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString('id-ID');
        }
        
        function startClock() {
            function updateTime() {
                const now = new Date();
                document.getElementById('currentDate').textContent = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                document.getElementById('currentTime').textContent = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            }
            updateTime();
            setInterval(updateTime, 1000);
        }
        
        loadData();
    </script>
</body>
</html>
