<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 20px; font-family: Arial; background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; }
        .btn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B35, #E85A24);
            border: none;
            color: white;
            font-size: 4rem;
            cursor: pointer;
            box-shadow: 0 10px 50px rgba(255,107,53,0.6);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        p { color: white; text-align: center; margin-top: 30px; font-size: 1.5rem; }
    </style>
</head>
<body>
    <button class="btn" onclick="speak()">🔊</button>
    <p>KLIK UNTUK DENGAR GAURANGA!</p>
    <script>
        function speak() {
            const msg = new SpeechSynthesisUtterance("Ya, [CEO]! Gaurangga siap menerima perintah!");
            msg.lang = 'id-ID';
            msg.rate = 0.95;
            speechSynthesis.speak(msg);
        }
    </script>
<script>/**
 * MAHA LAKSHMI - Biometric Authentication Guard
 */
(function() {
    'use strict';
    const SESSION_KEY = 'maha_lakshmi_session';
    
    function checkAuth() {
        if (window.location.pathname.includes('biometric-auth.html')) return true;
        const session = localStorage.getItem(SESSION_KEY);
        if (!session) { window.location.href = 'biometric-auth.html'; return false; }
        try {
            const d = JSON.parse(session);
            if (Date.now() - d.timestamp < 86400000) return true;
            localStorage.removeItem(SESSION_KEY);
        } catch(e) {}
        window.location.href = 'biometric-auth.html';
        return false;
    }
    window.biometricLogout = function() { localStorage.removeItem(SESSION_KEY); window.location.href = 'biometric-auth.html'; };
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', checkAuth);
    else setTimeout(checkAuth, 100);
})();
</script></body>
</html>
