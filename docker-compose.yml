version: '3.8'

services:
  crypto-payment:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto-payment-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
