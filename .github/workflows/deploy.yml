name: Deploy to GitHub Pages + Webhook

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: https://prahlad168.github.io/MAHA-LAKSHMI-CORP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          error_count: 3
          retention_days: 1
        
      - name: Deploy via Webhook
        run: |
          curl -s -X POST "https://payanganhospital.gianyarkab.go.id/webhook.php" || echo "Webhook triggered"

      - name: Summary
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "URL: https://prahlad168.github.io/Bot_Molty5" >> $GITHUB_STEP_SUMMARY
