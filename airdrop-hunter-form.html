<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirdropHunter - Sign Up</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .success {
            display: none;
            text-align: center;
            padding: 30px;
        }
        .success h2 {
            color: #10b981;
            margin-bottom: 15px;
        }
        .success p {
            color: #666;
            margin-bottom: 20px;
        }
        .whatsapp-btn {
            display: inline-block;
            padding: 14px 30px;
            background: #25D366;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 10px;
        }
        .product-badge {
            display: inline-block;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .province-select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            background: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="form-section">
            <div style="text-align: center;">
                <span class="product-badge">🚀 AIRDROPHUNTER</span>
            </div>
            <h1>Daftar Airdrop Gratis!</h1>
            <p class="subtitle">Klaim crypto airdrop tanpa modal • Potential 10-100x</p>
            
            <form id="signup-form">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="nama" placeholder="Masukkan nama" required>
                </div>
                
                <div class="form-group">
                    <label>Nomor WhatsApp</label>
                    <input type="tel" id="whatsapp" placeholder="08xxxxxxxxxx" required>
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="email@example.com" required>
                </div>
                
                <div class="form-group">
                    <label>Provinsi</label>
                    <select id="province" required>
                        <option value="">Pilih Provinsi</option>
                        <option value="aceh">Aceh</option>
                        <option value="sumut">Sumatera Utara</option>
                        <option value="sumbar">Sumatera Barat</option>
                        <option value="riau">Riau</option>
                        <option value="jambi">Jambi</option>
                        <option value="sumsel">Sumatera Selatan</option>
                        <option value="bengkulu">Bengkulu</option>
                        <option value="lampung">Lampung</option>
                        <option value="jakarta">DKI Jakarta</option>
                        <option value="jabar">Jawa Barat</option>
                        <option value="jateng">Jawa Tengah</option>
                        <option value="yogyakarta">DI Yogyakarta</option>
                        <option value="jatim">Jawa Timur</option>
                        <option value="banten">Banten</option>
                        <option value="bali">Bali</option>
                        <option value="ntb">Nusa Tenggara Barat</option>
                        <option value="ntt">Nusa Tenggara Timur</option>
                        <option value="kalbar">Kalimantan Barat</option>
                        <option value="kalteng">Kalimantan Tengah</option>
                        <option value="kalsel">Kalimantan Selatan</option>
                        <option value="kaltim">Kalimantan Timur</option>
                        <option value="kalut">Kalimantan Utara</option>
                        <option value="sulut">Sulawesi Utara</option>
                        <option value="sulteng">Sulawesi Tengah</option>
                        <option value="sulsel">Sulawesi Selatan</option>
                        <option value="sultra">Sulawesi Tenggara</option>
                        <option value="gorontalo">Gorontalo</option>
                        <option value="sulbar">Sulawesi Barat</option>
                        <option value="maluku">Maluku</option>
                        <option value="malut">Maluku Utara</option>
                        <option value="papua">Papua</option>
                        <option value="papbar">Papua Barat</option>
                        <option value="papteng">Papua Tengah</option>
                        <option value="pappeg">Papua Pegunungan</option>
                        <option value="papsel">Papua Selatan</option>
                    </select>
                </div>
                
                <button type="submit">🚀 Daftar Sekarang</button>
            </form>
        </div>
        
        <div id="success-section" class="success">
            <h2>✅ Pendaftaran Berhasil!</h2>
            <p>Terima kasih sudah mendaftar AirdropHunter!<br>Tim kami akan menghubungi Anda via WhatsApp.</p>
            <p style="font-size: 14px; color: #888;">Estimasi airdrop: 1-4 minggu</p>
            <a href="https://wa.me/6281337558787?text=Halo%2C%20saya%20sudah%20daftar%20AirdropHunter" class="whatsapp-btn" target="_blank">
                💬 Chat WhatsApp
            </a>
        </div>
    </div>

    <script>
        // Save to localStorage and redirect
        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const lead = {
                nama: document.getElementById('nama').value,
                whatsapp: document.getElementById('whatsapp').value,
                email: document.getElementById('email').value,
                province: document.getElementById('province').value,
                product: 'AirdropHunter',
                date: new Date().toISOString()
            };
            
            // Save to localStorage
            let leads = JSON.parse(localStorage.getItem('maha_leads') || '[]');
            leads.push(lead);
            localStorage.setItem('maha_leads', JSON.stringify(leads));
            
            // Show success
            document.getElementById('form-section').style.display = 'none';
            document.getElementById('success-section').style.display = 'block';
            
            // Send to Google Sheets (if configured)
            // Replace with your Google Apps Script URL
            // fetch('YOUR_GOOGLE_SCRIPT_URL', { method: 'POST', body: JSON.stringify(lead) });
        });
    </script>
</body>
</html>
